version: '3.8'

services:
  investment-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: insideiim-ai-investment-research-agent:latest
    container_name: investment_research_agent
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - HOST=0.0.0.0
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - NEWS_API_KEY=${NEWS_API_KEY:-}
      - LOG_LEVEL=info
    volumes:
      # Persist historical JSON report records outside the container
      - ./data/history:/app/data/history
    restart: unless-stopped
